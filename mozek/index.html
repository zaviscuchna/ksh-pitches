/* ═════════════════════════════════════════════════════════════════════
   FLUID ETHER BACKGROUND — vanilla WebGL2
   ═════════════════════════════════════════════════════════════════════ */
(function fluidBg() {
  const canvas = document.getElementById('bg');
  const gl = canvas.getContext('webgl2', { antialias: false, alpha: false }) ||
             canvas.getContext('webgl',  { antialias: false, alpha: false });
  if (!gl) {
    canvas.style.background =
      'radial-gradient(circle at 30% 20%, rgba(212,175,110,0.18), transparent 50%), ' +
      'radial-gradient(circle at 70% 80%, rgba(224,122,166,0.16), transparent 55%), ' +
      'radial-gradient(circle at 50% 50%, rgba(107,138,212,0.13), transparent 60%)';
    return;
  }
  const isWebGL2 = !!gl.createVertexArray;
  const VS = isWebGL2 ? `#version 300 es
in vec2 a_pos;
out vec2 v_uv;
void main() {
  v_uv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}` : `
attribute vec2 a_pos;
varying vec2 v_uv;
void main() {
  v_uv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`;

  const FS = isWebGL2 ? `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 outColor;
uniform float u_time;
uniform vec2 u_res;
uniform vec2 u_mouse;

float hash(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
float noise(vec2 p){
  vec2 i=floor(p), f=fract(p);
  float a=hash(i), b=hash(i+vec2(1,0)), c=hash(i+vec2(0,1)), d=hash(i+vec2(1,1));
  vec2 u=f*f*(3.0-2.0*f);
  return mix(a,b,u.x)+(c-a)*u.y*(1.0-u.x)+(d-b)*u.x*u.y;
}
float fbm(vec2 p){
  float v=0.0, a=0.5;
  for(int i=0;i<5;i++){ v+=a*noise(p); p=p*2.02+vec2(11.7,3.1); a*=0.5; }
  return v;
}
void main(){
  vec2 uv = v_uv;
  vec2 p  = (gl_FragCoord.xy - 0.5*u_res) / u_res.y;

  float t = u_time * 0.06;

  // Distorted domain-warp
  vec2 q = vec2(fbm(p*1.4 + vec2(0.0, t)), fbm(p*1.4 + vec2(5.2, -t)));
  vec2 r = vec2(fbm(p*1.6 + 1.7*q + vec2(t*1.3, 9.2)),
                fbm(p*1.6 + 1.7*q + vec2(8.3, -t*1.1)));
  float f = fbm(p*1.2 + 2.4*r);

  // Mouse influence
  vec2 m = (u_mouse - 0.5*u_res) / u_res.y;
  float mDist = length(p - m);
  float mInf = exp(-mDist * 1.2) * 0.55;

  // KSH paleta — gold, pink, royal blue, deep violet, off-black
  vec3 cBg     = vec3(0.018, 0.016, 0.038);   // deep blue-black
  vec3 cBlue   = vec3(0.04, 0.10, 0.32);      // royal blue
  vec3 cViolet = vec3(0.28, 0.14, 0.42);      // deep violet
  vec3 cGold   = vec3(0.85, 0.68, 0.42);      // KSH gold
  vec3 cPink   = vec3(0.88, 0.46, 0.62);      // KSH pink

  vec3 col = cBg;
  col = mix(col, cBlue,   smoothstep(0.20, 0.55, f));
  col = mix(col, cViolet, smoothstep(0.40, 0.70, f + 0.25*r.y));
  col = mix(col, cPink,   smoothstep(0.55, 0.85, f + mInf*0.4));
  col = mix(col, cGold,   smoothstep(0.70, 1.00, fbm(p*2.6 + r + t*0.4) + mInf*0.5));

  // Edge halo around mouse
  col += cGold * mInf * 0.18;

  // Vignette
  float vig = smoothstep(1.4, 0.4, length(p));
  col *= 0.55 + 0.45 * vig;

  // Subtle film grain
  col += (hash(gl_FragCoord.xy + u_time) - 0.5) * 0.02;

  outColor = vec4(col, 1.0);
}` : `
precision highp float;
varying vec2 v_uv;
uniform float u_time;
uniform vec2 u_res;
uniform vec2 u_mouse;

float hash(vec2 p){ p=fract(p*vec2(123.34,456.21)); p+=dot(p,p+45.32); return fract(p.x*p.y); }
float noise(vec2 p){
  vec2 i=floor(p), f=fract(p);
  float a=hash(i), b=hash(i+vec2(1.0,0.0)), c=hash(i+vec2(0.0,1.0)), d=hash(i+vec2(1.0,1.0));
  vec2 u=f*f*(3.0-2.0*f);
  return mix(a,b,u.x)+(c-a)*u.y*(1.0-u.x)+(d-b)*u.x*u.y;
}
float fbm(vec2 p){
  float v=0.0; float a=0.5;
  for(int i=0;i<5;i++){ v+=a*noise(p); p=p*2.02+vec2(11.7,3.1); a*=0.5; }
  return v;
}
void main(){
  vec2 p  = (gl_FragCoord.xy - 0.5*u_res) / u_res.y;
  float t = u_time * 0.06;
  vec2 q = vec2(fbm(p*1.4 + vec2(0.0, t)), fbm(p*1.4 + vec2(5.2, -t)));
  vec2 r = vec2(fbm(p*1.6 + 1.7*q + vec2(t*1.3, 9.2)),
                fbm(p*1.6 + 1.7*q + vec2(8.3, -t*1.1)));
  float f = fbm(p*1.2 + 2.4*r);
  vec2 m = (u_mouse - 0.5*u_res) / u_res.y;
  float mInf = exp(-length(p - m) * 1.2) * 0.55;
  vec3 col = vec3(0.018, 0.016, 0.038);
  col = mix(col, vec3(0.04,0.10,0.32),  smoothstep(0.20,0.55,f));
  col = mix(col, vec3(0.28,0.14,0.42),  smoothstep(0.40,0.70,f + 0.25*r.y));
  col = mix(col, vec3(0.88,0.46,0.62),  smoothstep(0.55,0.85,f + mInf*0.4));
  col = mix(col, vec3(0.85,0.68,0.42),  smoothstep(0.70,1.00, fbm(p*2.6 + r + t*0.4) + mInf*0.5));
  col += vec3(0.85,0.68,0.42) * mInf * 0.18;
  float vig = smoothstep(1.4, 0.4, length(p));
  col *= 0.55 + 0.45 * vig;
  col += (hash(gl_FragCoord.xy + u_time) - 0.5) * 0.02;
  gl_FragColor = vec4(col, 1.0);
}`;

  function compile(type, src){
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
      console.warn(gl.getShaderInfoLog(s));
      return null;
    }
    return s;
  }
  const vs = compile(gl.VERTEX_SHADER, VS);
  const fs = compile(gl.FRAGMENT_SHADER, FS);
  if (!vs || !fs) return;
  const prog = gl.createProgram();
  gl.attachShader(prog, vs);
  gl.attachShader(prog, fs);
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) { console.warn(gl.getProgramInfoLog(prog)); return; }
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(prog, 'a_pos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  const uTime  = gl.getUniformLocation(prog, 'u_time');
  const uRes   = gl.getUniformLocation(prog, 'u_res');
  const uMouse = gl.getUniformLocation(prog, 'u_mouse');

  let mouse = { x: 0, y: 0, tx: 0, ty: 0 };
  window.addEventListener('mousemove', e => {
    mouse.tx = e.clientX;
    mouse.ty = window.innerHeight - e.clientY;
  });
  window.addEventListener('touchmove', e => {
    if (e.touches.length) {
      mouse.tx = e.touches[0].clientX;
      mouse.ty = window.innerHeight - e.touches[0].clientY;
    }
  }, { passive: true });

  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 1.6);
    canvas.width  = Math.floor(window.innerWidth * dpr * 0.65);   // render at lower res, upscale
    canvas.height = Math.floor(window.innerHeight * dpr * 0.65);
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  resize();
  window.addEventListener('resize', resize);

  let start = performance.now();
  function loop(now) {
    // Mouse easing
    mouse.x += (mouse.tx - mouse.x) * 0.06;
    mouse.y += (mouse.ty - mouse.y) * 0.06;

    const t = (now - start) / 1000;
    gl.uniform1f(uTime, t);
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform2f(uMouse, mouse.x * (canvas.width / window.innerWidth), mouse.y * (canvas.height / window.innerHeight));
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();

/* ═════════════════════════════════════════════════════════════════════
   STATE & PERSISTENCE
   ═════════════════════════════════════════════════════════════════════ */
const DATA = window.MOZEK_DATA;
const LS_KEY = 'mozek_state_v2';

const defaultState = () => ({
  positions: {},        // { nodeId: {x, y} } — overrides default radial layout
  notes:     [],        // [{id, x, y, text, color}]
  links:     [],        // [{id, x, y, url, title}]
  customProjects: [],   // user-added projects (same shape as DATA.projects)
  pins:      {},        // { projectId: [{type, value, label, id}] }
  customLinks: []       // { id, from, to } — connection between any two node ids
});

function loadState() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return defaultState();
    return Object.assign(defaultState(), JSON.parse(raw));
  } catch(e) { return defaultState(); }
}
function saveState() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(state)); } catch(e) {}
}
const state = loadState();

let filters = { categories: new Set(), stacks: new Set(), owners: new Set() };
let searchTerm = '';

const CAT_RADIUS = 460;
const PROJ_DISTANCE = 240;
const PROJ_SPACING = 80;
const SVG_OFFSET = 4000;

/* ═════════════════════════════════════════════════════════════════════
   UTILS
   ═════════════════════════════════════════════════════════════════════ */
const $  = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

function uid(prefix = 'n') { return prefix + '-' + Math.random().toString(36).slice(2, 9); }

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escWithItalic(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/&lt;em&gt;/g, '<em>').replace(/&lt;\/em&gt;/g, '</em>');
}
function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso + (iso.length === 10 ? 'T12:00:00' : ''));
  if (isNaN(d.getTime())) return iso;
  return d.toLocaleDateString('cs-CZ', { day: 'numeric', month: 'long', year: 'numeric' });
}
function ownerLabel(o) {
  return { maty: 'Maty', zavis: 'Záviš', shared: 'Společné' }[o] || o;
}
function hexToRgba(hex, alpha) {
  if (!hex || !hex.startsWith('#')) return `rgba(212,175,110,${alpha})`;
  const h = hex.replace('#', '');
  const r = parseInt(h.slice(0,2), 16);
  const g = parseInt(h.slice(2,4), 16);
  const b = parseInt(h.slice(4,6), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function getAllProjects() {
  return [...(DATA.projects || []), ...state.customProjects];
}

/* ═════════════════════════════════════════════════════════════════════
   LAYOUT — defaultní radiální + override z state.positions
   ═════════════════════════════════════════════════════════════════════ */
function layout() {
  const cats = DATA.categories;
  const angleStep = (Math.PI * 2) / cats.length;

  cats.forEach((cat, i) => {
    const angle = i * angleStep - Math.PI / 2;
    cat.angle = angle;
    const def = { x: Math.cos(angle) * CAT_RADIUS, y: Math.sin(angle) * CAT_RADIUS };
    const saved = state.positions['cat-' + cat.id];
    cat.x = saved ? saved.x : def.x;
    cat.y = saved ? saved.y : def.y;
    cat._defX = def.x; cat._defY = def.y;

    const projects = getAllProjects().filter(p => p.category === cat.id);
    const dirX = Math.cos(angle), dirY = Math.sin(angle);
    const perpX = -dirY, perpY = dirX;
    const n = projects.length;
    projects.forEach((p, j) => {
      const offset = (j - (n - 1) / 2) * PROJ_SPACING;
      const def = {
        x: cat._defX + dirX * PROJ_DISTANCE + perpX * offset,
        y: cat._defY + dirY * PROJ_DISTANCE + perpY * offset
      };
      const saved = state.positions['proj-' + p.id];
      p.x = saved ? saved.x : def.x;
      p.y = saved ? saved.y : def.y;
      p._defX = def.x; p._defY = def.y;
    });
  });
}

/* ═════════════════════════════════════════════════════════════════════
   RENDER
   ═════════════════════════════════════════════════════════════════════ */
function render() {
  layout();
  const canvas = $('#canvas');
  $$('.node', canvas).forEach(n => n.remove());

  // Center
  const centerPos = state.positions['center'] || { x: 0, y: 0 };
  const cn = makeCenterNode(centerPos);
  canvas.appendChild(cn);

  // Categories
  DATA.categories.forEach(cat => {
    const n = makeCategoryNode(cat);
    canvas.appendChild(n);
  });

  // Projects (default + custom)
  getAllProjects().forEach(p => {
    const n = makeProjectNode(p);
    canvas.appendChild(n);
  });

  // Notes
  state.notes.forEach(note => {
    canvas.appendChild(makeNoteNode(note));
  });

  // User links
  state.links.forEach(link => {
    canvas.appendChild(makeLinkNode(link));
  });

  drawLinks();
  applyFilters();
  updateStats();
}

function makeCenterNode(pos) {
  const root = DATA.brain || DATA.studio || {};
  const el = document.createElement('div');
  el.className = 'node node-center';
  el.dataset.nodeId = 'center';
  el.style.left = pos.x + 'px';
  el.style.top  = pos.y + 'px';
  el.innerHTML = `
    <div class="center-icon">${PX.brain()}</div>
    <div class="center-name">${escWithItalic(root.name || 'MinD <em>map</em>')}</div>
    <div class="center-tagline">${esc(root.tagline || '')}</div>
  `;
  bindDrag(el, 'center');
  el.addEventListener('click', e => {
    if (el._wasDragged) return;
    e.stopPropagation();
    document.body.classList.toggle('show-all');
  });
  bindContextMenu(el, () => ctxForCenter());
  return el;
}

function makeCategoryNode(cat) {
  const projects = getAllProjects().filter(p => p.category === cat.id);
  const el = document.createElement('div');
  el.className = 'node node-cat';
  el.dataset.nodeId = 'cat-' + cat.id;
  el.dataset.catId = cat.id;
  el.style.left = cat.x + 'px';
  el.style.top  = cat.y + 'px';
  el.style.setProperty('--cat-color',  cat.color);
  el.style.setProperty('--cat-bg',     hexToRgba(cat.color, 0.12));
  el.style.setProperty('--cat-border', hexToRgba(cat.color, 0.4));
  el.style.setProperty('--cat-glow',   hexToRgba(cat.color, 0.45));
  const iconName = CAT_ICON[cat.id];
  const iconSvg = iconName ? PX.icon(iconName, cat.color) : '';
  el.innerHTML = `
    <div class="cat-head">
      <div class="cat-icon-box" style="background:${hexToRgba(cat.color, 0.15)};">${iconSvg}</div>
      <div class="cat-meta">
        <div class="cat-name">${esc(cat.name)}</div>
        <div class="cat-count">${projects.length} ${projects.length === 1 ? 'projekt' : (projects.length < 5 ? 'projekty' : 'projektů')}</div>
      </div>
    </div>
    <div class="cat-desc">${esc(cat.desc || '')}</div>
  `;
  bindDrag(el, 'cat-' + cat.id);
  el.addEventListener('click', e => {
    if (el._wasDragged) return;
    toggleCatFilter(cat.id);
  });
  el.addEventListener('mouseenter', () => highlightCategory(cat.id, true));
  el.addEventListener('mouseleave', () => highlightCategory(cat.id, false));
  bindContextMenu(el, () => ctxForCategory(cat.id));
  return el;
}

function makeProjectNode(p) {
  const cat = DATA.categories.find(c => c.id === p.category);
  const stack = DATA.stacks.find(s => s.id === p.stack);
  const el = document.createElement('div');
  el.className = 'node node-proj';
  el.dataset.nodeId = 'proj-' + p.id;
  el.dataset.projId = p.id;
  el.style.left = p.x + 'px';
  el.style.top  = p.y + 'px';
  el.style.setProperty('--cat-color', cat?.color || 'var(--gold)');

  const todoCount = (p.todo || []).filter(Boolean).length;
  const pinCount  = (state.pins[p.id] || []).length;
  const punkSvg = PX.punk(p.id);

  el.innerHTML = `
    <div class="proj-head">
      <div class="proj-logo">${punkSvg}</div>
      <div class="proj-name">${esc(p.name)}</div>
    </div>
    <div class="proj-meta">
      ${stack ? `<span class="proj-chip" style="color:${stack.color}"><span class="dot"></span>${stack.name}</span>` : ''}
      ${todoCount > 0 ? `<span class="proj-todo-badge">${todoCount} TODO</span>` : ''}
      ${pinCount > 0 ? `<span class="proj-pin-badge">${pinCount} PIN</span>` : ''}
    </div>
  `;
  bindDrag(el, 'proj-' + p.id);
  el.addEventListener('click', e => {
    if (el._wasDragged) return;
    e.stopPropagation();
    openDrawer(p.id);
  });
  el.addEventListener('mouseenter', () => highlightProject(p.id, true));
  el.addEventListener('mouseleave', () => highlightProject(p.id, false));
  bindContextMenu(el, () => ctxForProject(p.id));
  return el;
}

function makeNoteNode(note) {
  const el = document.createElement('div');
  el.className = 'node node-note';
  el.dataset.nodeId = 'note-' + note.id;
  el.dataset.color = note.color || 'yellow';
  el.dataset.size  = note.size  || 'md';
  el.style.left = note.x + 'px';
  el.style.top  = note.y + 'px';
  el.style.width     = (note.w || 220) + 'px';
  el.style.minHeight = (note.h || 130) + 'px';
  el.innerHTML = `
    <div class="note-text" contenteditable="true" spellcheck="false">${esc(note.text || '')}</div>
    <div class="note-toolbar">
      <span class="note-color yellow" data-c="yellow" title="Žlutá"></span>
      <span class="note-color pink"   data-c="pink"   title="Růžová"></span>
      <span class="note-color blue"   data-c="blue"   title="Modrá"></span>
      <span class="note-color green"  data-c="green"  title="Zelená"></span>
      <button class="note-size-btn" data-s="sm" title="Malé">S</button>
      <button class="note-size-btn" data-s="md" title="Střední">M</button>
      <button class="note-size-btn" data-s="lg" title="Velké">L</button>
      <button class="note-size-btn" data-s="xl" title="Headline">H</button>
      <div class="note-spacer"></div>
      <button class="note-del" title="Smazat">✕</button>
    </div>
    <div class="note-resize" title="Roztáhnout"></div>
  `;
  bindDrag(el, 'note-' + note.id, { isNote: true });

  // Edit
  const txt = $('.note-text', el);
  txt.addEventListener('input', () => {
    note.text = txt.innerText;
    saveState();
  });
  txt.addEventListener('mousedown', e => e.stopPropagation()); // don't start drag on text

  // Color
  $$('.note-color', el).forEach(b => {
    b.addEventListener('click', e => {
      e.stopPropagation();
      note.color = b.dataset.c;
      el.dataset.color = b.dataset.c;
      saveState();
    });
  });

  // Size buttons
  $$('.note-size-btn', el).forEach(b => {
    b.addEventListener('click', e => {
      e.stopPropagation();
      note.size = b.dataset.s;
      el.dataset.size = b.dataset.s;
      saveState();
      drawLinks();
    });
  });

  // Resize handle
  const resize = $('.note-resize', el);
  resize.addEventListener('mousedown', e => {
    e.stopPropagation();
    e.preventDefault();
    const startW = parseFloat(el.style.width)     || 220;
    const startH = parseFloat(el.style.minHeight) || 130;
    const sx = e.clientX, sy = e.clientY;

    function onMove(ev) {
      const dx = (ev.clientX - sx) / viewState.scale;
      const dy = (ev.clientY - sy) / viewState.scale;
      const w = Math.max(160, Math.min(720, startW + dx));
      const h = Math.max(90,  Math.min(720, startH + dy));
      el.style.width     = w + 'px';
      el.style.minHeight = h + 'px';
      note.w = w; note.h = h;
      drawLinks();
    }
    function onUp() {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseup', onUp);
      saveState();
    }
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);
  });

  // Delete
  $('.note-del', el).addEventListener('click', e => {
    e.stopPropagation();
    state.notes = state.notes.filter(x => x.id !== note.id);
    delete state.positions['note-' + note.id];
    saveState();
    el.remove();
    drawLinks();
    updateStats();
  });

  bindContextMenu(el, () => ctxForNote(note.id));
  return el;
}

function makeLinkNode(link) {
  const el = document.createElement('div');
  el.className = 'node node-link';
  el.dataset.nodeId = 'link-' + link.id;
  el.style.left = link.x + 'px';
  el.style.top  = link.y + 'px';

  let host = '';
  try { host = new URL(link.url).host.replace('www.', ''); } catch(e) { host = link.url; }
  el.innerHTML = `
    <div class="link-row">
      <div class="link-icon-box">🔗</div>
      <div class="link-info">
        <div class="link-title">${esc(link.title || host)}</div>
        <div class="link-url">${esc(host)}</div>
      </div>
    </div>
    <button class="link-del" title="Smazat">✕</button>
  `;
  bindDrag(el, 'link-' + link.id);
  el.addEventListener('click', e => {
    if (el._wasDragged) return;
    if (e.target.closest('.link-del')) return;
    window.open(link.url, '_blank');
  });
  $('.link-del', el).addEventListener('click', e => {
    e.stopPropagation();
    state.links = state.links.filter(x => x.id !== link.id);
    delete state.positions['link-' + link.id];
    saveState();
    el.remove();
    drawLinks();
  });
  bindContextMenu(el, () => ctxForLink(link.id));
  return el;
}

/* ═════════════════════════════════════════════════════════════════════
   DRAG SYSTEM — pro nody na canvasu
   ═════════════════════════════════════════════════════════════════════ */
function bindDrag(el, nodeId, opts = {}) {
  let start = null;
  el.addEventListener('mousedown', e => {
    // Skip drag pokud klik na ovládací prvek uvnitř (note toolbar, contenteditable…)
    if (e.button !== 0) return;
    if (e.target.closest('.note-text') ||
        e.target.closest('.note-toolbar') ||
        e.target.closest('.note-resize') ||
        e.target.closest('.link-del')) return;
    e.stopPropagation();
    start = {
      sx: e.clientX, sy: e.clientY,
      ox: parseFloat(el.style.left) || 0,
      oy: parseFloat(el.style.top)  || 0,
      moved: false
    };
    el._wasDragged = false;
    el.classList.add('dragging-node');
  });
  window.addEventListener('mousemove', e => {
    if (!start) return;
    const dx = (e.clientX - start.sx) / viewState.scale;
    const dy = (e.clientY - start.sy) / viewState.scale;
    if (!start.moved && Math.hypot(e.clientX - start.sx, e.clientY - start.sy) > 4) {
      start.moved = true;
      el._wasDragged = true;
    }
    if (start.moved) {
      const nx = start.ox + dx;
      const ny = start.oy + dy;
      el.style.left = nx + 'px';
      el.style.top  = ny + 'px';
      // Update underlying entity
      updateNodePosition(nodeId, nx, ny);
      drawLinks();
    }
  });
  window.addEventListener('mouseup', e => {
    if (!start) return;
    el.classList.remove('dragging-node');
    if (start.moved) {
      saveState();
      // Reset _wasDragged after small delay so click handler can read it
      setTimeout(() => { el._wasDragged = false; }, 50);
    }
    start = null;
  });
}

function updateNodePosition(nodeId, x, y) {
  state.positions[nodeId] = { x, y };
  // Sync to entity (so drawLinks works)
  if (nodeId === 'center') {
    /* center handled via positions only */
  } else if (nodeId.startsWith('cat-')) {
    const cat = DATA.categories.find(c => 'cat-' + c.id === nodeId);
    if (cat) { cat.x = x; cat.y = y; }
  } else if (nodeId.startsWith('proj-')) {
    const id = nodeId.replace('proj-', '');
    const p = getAllProjects().find(x => x.id === id);
    if (p) { p.x = x; p.y = y; }
  } else if (nodeId.startsWith('note-')) {
    const id = nodeId.replace('note-', '');
    const n = state.notes.find(x => x.id === id);
    if (n) { n.x = x; n.y = y; }
  } else if (nodeId.startsWith('link-')) {
    const id = nodeId.replace('link-', '');
    const l = state.links.find(x => x.id === id);
    if (l) { l.x = x; l.y = y; }
  }
}

/* ═════════════════════════════════════════════════════════════════════
   CONNECTIONS (SVG)
   ═════════════════════════════════════════════════════════════════════ */
function drawLinks() {
  const svg = $('#linksSvg');
  svg.innerHTML = '';
  const center = state.positions['center'] || { x: 0, y: 0 };

  // Center → Category
  DATA.categories.forEach(cat => {
    const path = bezier(center.x, center.y, cat.x, cat.y);
    const el = svgEl('path', { d: path, class: 'link-path cat-link' });
    el.dataset.from = 'center'; el.dataset.to = 'cat-' + cat.id;
    svg.appendChild(el);
  });
  // Category → Project
  getAllProjects().forEach(p => {
    const cat = DATA.categories.find(c => c.id === p.category);
    if (!cat) return;
    const path = bezier(cat.x, cat.y, p.x, p.y);
    const el = svgEl('path', { d: path, class: 'link-path' });
    el.dataset.from = 'cat-' + cat.id; el.dataset.to = 'proj-' + p.id;
    svg.appendChild(el);
  });
  // User-defined custom links
  state.customLinks.forEach(l => {
    const a = nodePos(l.from);
    const b = nodePos(l.to);
    if (!a || !b) return;
    const el = svgEl('path', { d: bezier(a.x, a.y, b.x, b.y), class: 'link-path user-link' });
    el.dataset.from = l.from; el.dataset.to = l.to;
    svg.appendChild(el);
  });
}

function nodePos(nodeId) {
  if (state.positions[nodeId]) return state.positions[nodeId];
  if (nodeId === 'center') return { x: 0, y: 0 };
  if (nodeId.startsWith('cat-')) {
    const c = DATA.categories.find(c => 'cat-' + c.id === nodeId);
    return c ? { x: c.x, y: c.y } : null;
  }
  if (nodeId.startsWith('proj-')) {
    const id = nodeId.replace('proj-', '');
    const p = getAllProjects().find(x => x.id === id);
    return p ? { x: p.x, y: p.y } : null;
  }
  if (nodeId.startsWith('note-')) {
    const n = state.notes.find(x => 'note-' + x.id === nodeId);
    return n ? { x: n.x, y: n.y } : null;
  }
  if (nodeId.startsWith('link-')) {
    const l = state.links.find(x => 'link-' + x.id === nodeId);
    return l ? { x: l.x, y: l.y } : null;
  }
  return null;
}

function bezier(x1, y1, x2, y2) {
  const sx = x1 + SVG_OFFSET, sy = y1 + SVG_OFFSET;
  const ex = x2 + SVG_OFFSET, ey = y2 + SVG_OFFSET;
  const dx = (ex - sx) * 0.5;
  return `M ${sx} ${sy} C ${sx + dx} ${sy}, ${ex - dx} ${ey}, ${ex} ${ey}`;
}
function svgEl(name, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', name);
  Object.entries(attrs || {}).forEach(([k, v]) => el.setAttribute(k, v));
  return el;
}

/* ═════════════════════════════════════════════════════════════════════
   HIGHLIGHTS
   ═════════════════════════════════════════════════════════════════════ */
function highlightCategory(catId, on) {
  $$('.link-path').forEach(l => {
    if (l.dataset.from === 'cat-' + catId || l.dataset.to === 'cat-' + catId) {
      l.classList.toggle('highlight', on);
    }
  });
}
function highlightProject(projId, on) {
  const proj = getAllProjects().find(p => p.id === projId);
  if (!proj) return;
  $$('.link-path').forEach(l => {
    if (l.dataset.to === 'proj-' + projId) l.classList.toggle('highlight', on);
    else if (l.dataset.to === 'cat-' + proj.category) l.classList.toggle('highlight', on);
  });
}

/* ═════════════════════════════════════════════════════════════════════
   FILTERS
   ═════════════════════════════════════════════════════════════════════ */
function renderFilters() {
  const projects = getAllProjects();
  // Categories — pixel art icons
  $('#catFilters').innerHTML = DATA.categories.map(c => {
    const count = projects.filter(p => p.category === c.id).length;
    const iconName = CAT_ICON[c.id];
    const iconHtml = iconName
      ? `<span style="background:${hexToRgba(c.color, 0.18)};width:100%;height:100%;display:block;">${PX.icon(iconName, c.color)}</span>`
      : esc(c.icon || '');
    return filterBtn('cat', c.id, iconHtml, c.name, count);
  }).join('');
  // Stacks — keep colored dot
  $('#stackFilters').innerHTML = DATA.stacks.map(s => {
    const count = projects.filter(p => p.stack === s.id).length;
    if (count === 0) return '';
    return filterBtn('stack', s.id, '<span style="color:'+s.color+';font-size:0.7rem;">●</span>', s.name, count);
  }).join('');
  // Owners — Maty/Záviš get tiny punk podle jejich projekt-IDčka, shared = people icon
  const owners = [
    { id: 'maty',   name: 'Maty',     seed: 'p-maty',  fallback: 'head' },
    { id: 'zavis',  name: 'Záviš',    seed: 'p-zavis', fallback: 'head' },
    { id: 'shared', name: 'Společné', icon: PX.icon('people', '#c9b1d4') }
  ];
  $('#ownerFilters').innerHTML = owners.map(o => {
    const count = projects.filter(p => p.owner === o.id).length;
    if (count === 0) return '';
    const iconHtml = o.icon || PX.punk(o.seed);
    return filterBtn('owner', o.id, iconHtml, o.name, count);
  }).join('');
}
function filterBtn(type, id, icon, name, count) {
  return `
    <button class="rail-btn" data-type="${type}" data-id="${id}">
      <span class="rail-btn-l">
        <span class="rail-icon">${icon}</span>
        <span class="rail-name">${name}</span>
      </span>
      <span class="rail-count">${count}</span>
    </button>`;
}
function toggleCatFilter(catId) {
  const btn = document.querySelector(`.rail-btn[data-type="cat"][data-id="${catId}"]`);
  if (btn) btn.click();
}
function applyFilters() {
  const projects = getAllProjects();
  const filtered = projects.filter(p => {
    if (filters.categories.size > 0 && !filters.categories.has(p.category)) return false;
    if (filters.stacks.size     > 0 && !filters.stacks.has(p.stack))         return false;
    if (filters.owners.size     > 0 && !filters.owners.has(p.owner))         return false;
    if (searchTerm) {
      const haystack = [
        p.name, p.description, p.tech_notes, p.status_note,
        p.client?.name, p.client?.company,
        ...(p.tags || [])
      ].join(' ').toLowerCase();
      if (!haystack.includes(searchTerm)) return false;
    }
    return true;
  });
  const visibleIds = new Set(filtered.map(p => p.id));
  const visibleCats = new Set(filtered.map(p => p.category));
  const explicitCats = filters.categories.size > 0 ? new Set(filters.categories) : visibleCats;

  $$('.node-proj').forEach(n => n.classList.toggle('dim', !visibleIds.has(n.dataset.projId)));
  $$('.node-cat').forEach(n => n.classList.toggle('dim', !explicitCats.has(n.dataset.catId)));
  $$('.link-path').forEach(l => {
    let visible = true;
    if (l.dataset.from === 'center' && l.dataset.to.startsWith('cat-')) {
      const catId = l.dataset.to.replace('cat-', '');
      visible = explicitCats.has(catId);
    } else if (l.dataset.to.startsWith('proj-')) {
      visible = visibleIds.has(l.dataset.to.replace('proj-', ''));
    }
    l.classList.toggle('dim', !visible);
  });
}

function updateStats() {
  $('#statTotal').textContent  = getAllProjects().length;
  $('#statActive').textContent = getAllProjects().filter(p => p.category === 'active').length;
  $('#statNotes').textContent  = state.notes.length + state.links.length;
}

/* ═════════════════════════════════════════════════════════════════════
   CONTEXT MENU
   ═════════════════════════════════════════════════════════════════════ */
let _ctxX = 0, _ctxY = 0;       // canvas coords kde se kliklo (uvnitř canvasu)
let _ctxClientX = 0, _ctxClientY = 0;

function bindContextMenu(el, builder) {
  el.addEventListener('contextmenu', e => {
    e.preventDefault();
    e.stopPropagation();
    showCtxMenu(e.clientX, e.clientY, builder());
  });
}

function showCtxMenu(clientX, clientY, items) {
  const menu = $('#ctxMenu');
  menu.innerHTML = items.map(it => {
    if (it.divider) return '<div class="ctx-divider"></div>';
    return `<div class="ctx-item ${it.danger ? 'danger' : ''}" data-action="${it.action}">
      <span class="ctx-icon">${it.icon || ''}</span>
      <span>${esc(it.label)}</span>
    </div>`;
  }).join('');

  // Bind actions
  $$('.ctx-item', menu).forEach(it => {
    it.addEventListener('click', () => {
      const a = it.dataset.action;
      const found = items.find(i => i.action === a);
      if (found?.fn) found.fn();
      hideCtxMenu();
    });
  });
  menu.style.left = clientX + 'px';
  menu.style.top  = clientY + 'px';
  menu.classList.add('open');

  // Recompute coords for actions that need canvas position
  _ctxClientX = clientX; _ctxClientY = clientY;
  const c = clientToCanvas(clientX, clientY);
  _ctxX = c.x; _ctxY = c.y;
}

function hideCtxMenu() { $('#ctxMenu').classList.remove('open'); }

window.addEventListener('mousedown', e => {
  if (!e.target.closest('#ctxMenu')) hideCtxMenu();
});
window.addEventListener('keydown', e => { if (e.key === 'Escape') hideCtxMenu(); });

function clientToCanvas(cx, cy) {
  const wrap = $('#canvasWrap');
  const r = wrap.getBoundingClientRect();
  const ox = cx - r.left - r.width / 2;
  const oy = cy - r.top  - r.height / 2;
  return {
    x: (ox - viewState.tx) / viewState.scale,
    y: (oy - viewState.ty) / viewState.scale
  };
}

function ctxForCanvas() {
  return [
    { icon: '＋', label: 'Přidat poznámku zde', action: 'addNote',
      fn: () => addNoteAt(_ctxX, _ctxY) },
    { icon: '🔗', label: 'Přidat odkaz zde', action: 'addLink',
      fn: () => promptAddLink(_ctxX, _ctxY) },
    { icon: '✦', label: 'Nový projekt zde', action: 'addProject',
      fn: () => promptAddProject(_ctxX, _ctxY) },
    { divider: true },
    { icon: '⟳', label: 'Resetovat layout', action: 'reset', fn: resetLayout },
  ];
}
function ctxForCenter() {
  return [
    { icon: '⟳', label: 'Vrátit do středu', action: 'reset',
      fn: () => { delete state.positions['center']; saveState(); render(); } },
  ];
}
function ctxForCategory(catId) {
  return [
    { icon: '◉', label: 'Filtrovat na tuhle kategorii', action: 'filter',
      fn: () => toggleCatFilter(catId) },
    { icon: '⟳', label: 'Vrátit do výchozí pozice', action: 'reset',
      fn: () => { delete state.positions['cat-' + catId]; saveState(); render(); } },
  ];
}
function ctxForProject(projId) {
  return [
    { icon: '➔', label: 'Otevřít detail', action: 'open',
      fn: () => openDrawer(projId) },
    { icon: '📎', label: 'Připnout poznámku', action: 'pin',
      fn: () => promptPinNote(projId) },
    { icon: '🔗', label: 'Připnout odkaz', action: 'pinLink',
      fn: () => promptPinLink(projId) },
    { divider: true },
    { icon: '⟳', label: 'Vrátit do výchozí pozice', action: 'reset',
      fn: () => { delete state.positions['proj-' + projId]; saveState(); render(); } },
    ...(projId.startsWith('cust-') ? [{
      icon: '✕', label: 'Smazat projekt', action: 'del', danger: true,
      fn: () => {
        if (!confirm('Opravdu smazat tenhle projekt?')) return;
        state.customProjects = state.customProjects.filter(x => x.id !== projId);
        delete state.positions['proj-' + projId];
        delete state.pins[projId];
        saveState();
        render();
      }
    }] : [])
  ];
}
function ctxForNote(noteId) {
  return [
    { icon: '✕', label: 'Smazat poznámku', action: 'del', danger: true,
      fn: () => {
        state.notes = state.notes.filter(x => x.id !== noteId);
        delete state.positions['note-' + noteId];
        saveState();
        render();
      } }
  ];
}
function ctxForLink(linkId) {
  const link = state.links.find(x => x.id === linkId);
  return [
    { icon: '↗', label: 'Otevřít v novém panelu', action: 'open',
      fn: () => link && window.open(link.url, '_blank') },
    { icon: '✕', label: 'Smazat odkaz', action: 'del', danger: true,
      fn: () => {
        state.links = state.links.filter(x => x.id !== linkId);
        delete state.positions['link-' + linkId];
        saveState();
        render();
      } }
  ];
}

/* ═════════════════════════════════════════════════════════════════════
   ADD ACTIONS — note / link / project
   ═════════════════════════════════════════════════════════════════════ */
function addNoteAt(x, y) {
  const note = { id: uid('note'), x, y, text: '', color: 'yellow' };
  state.notes.push(note);
  saveState();
  render();
  // Po render najdeme nový note a focusneme
  requestAnimationFrame(() => {
    const el = document.querySelector(`[data-node-id="note-${note.id}"] .note-text`);
    if (el) el.focus();
  });
}

function promptAddLink(x, y) {
  openModal({
    title: 'Přidat odkaz',
    fields: [
      { name: 'url',   label: 'URL',     placeholder: 'https://…', required: true },
      { name: 'title', label: 'Název (volitelné)', placeholder: 'Reactbits — Liquid Ether' }
    ],
    onSubmit: vals => {
      if (!vals.url) return;
      let url = vals.url.trim();
      if (!/^https?:/.test(url)) url = 'https://' + url;
      const link = { id: uid('link'), x, y, url, title: vals.title || '' };
      state.links.push(link);
      saveState();
      render();
    }
  });
}

function promptAddProject(x, y) {
  openModal({
    title: 'Nový projekt',
    fields: [
      { name: 'name',     label: 'Název',                 placeholder: 'Můj nový projekt', required: true },
      { name: 'category', label: 'Kategorie (id)',        placeholder: 'active / pitch-draft / …', required: true },
      { name: 'desc',     label: 'Krátký popis',          placeholder: 'O čem to je…', textarea: true }
    ],
    onSubmit: vals => {
      if (!vals.name || !vals.category) return;
      const id = 'cust-' + Math.random().toString(36).slice(2, 7);
      const p = {
        id, name: vals.name, category: vals.category,
        stack: 'mixed', owner: 'maty', type: 'project',
        client: {}, status_note: '', description: vals.desc || '',
        tech_notes: '', todo: [], tags: [], links: {}
      };
      state.customProjects.push(p);
      state.positions['proj-' + id] = { x, y };
      saveState();
      renderFilters();
      render();
    }
  });
}

function promptPinNote(projId) {
  openModal({
    title: 'Připnout poznámku',
    fields: [
      { name: 'text', label: 'Poznámka', placeholder: 'Napiš si pin…', textarea: true, required: true }
    ],
    onSubmit: vals => {
      if (!vals.text) return;
      if (!state.pins[projId]) state.pins[projId] = [];
      state.pins[projId].push({ id: uid('pin'), type: 'note', value: vals.text });
      saveState();
      render();
      openDrawer(projId);
    }
  });
}

function promptPinLink(projId) {
  openModal({
    title: 'Připnout odkaz',
    fields: [
      { name: 'url',   label: 'URL',     placeholder: 'https://…', required: true },
      { name: 'label', label: 'Popisek', placeholder: 'Live web' }
    ],
    onSubmit: vals => {
      if (!vals.url) return;
      let url = vals.url.trim();
      if (!/^https?:/.test(url)) url = 'https://' + url;
      if (!state.pins[projId]) state.pins[projId] = [];
      state.pins[projId].push({ id: uid('pin'), type: 'link', value: url, label: vals.label || '' });
      saveState();
      render();
      openDrawer(projId);
    }
  });
}

function resetLayout() {
  if (!confirm('Vrátit všechny nody do výchozí radiální pozice?')) return;
  state.positions = {};
  saveState();
  render();
}

/* ═════════════════════════════════════════════════════════════════════
   MODAL
   ═════════════════════════════════════════════════════════════════════ */
function openModal({ title, fields, onSubmit }) {
  const ov = $('#modalOverlay'), box = $('#modalBox');
  box.innerHTML = `
    <h3>${esc(title)}</h3>
    ${fields.map(f => `
      <label>${esc(f.label)}</label>
      ${f.textarea
        ? `<textarea data-name="${esc(f.name)}" rows="3" placeholder="${esc(f.placeholder || '')}"></textarea>`
        : `<input data-name="${esc(f.name)}" type="text" placeholder="${esc(f.placeholder || '')}">`}
    `).join('')}
    <div class="modal-actions">
      <button class="modal-btn" data-act="cancel">Zrušit</button>
      <button class="modal-btn primary" data-act="ok">Přidat</button>
    </div>
  `;
  ov.classList.add('open');
  setTimeout(() => box.querySelector('input,textarea')?.focus(), 50);

  function close() { ov.classList.remove('open'); }
  function submit() {
    const vals = {};
    fields.forEach(f => {
      const inp = box.querySelector(`[data-name="${f.name}"]`);
      vals[f.name] = inp ? inp.value.trim() : '';
    });
    onSubmit(vals);
    close();
  }
  box.querySelector('[data-act="cancel"]').addEventListener('click', close);
  box.querySelector('[data-act="ok"]').addEventListener('click', submit);
  ov.addEventListener('click', e => { if (e.target === ov) close(); });
  // Enter to submit (in inputs only)
  box.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && e.target.tagName === 'INPUT') {
      e.preventDefault();
      submit();
    }
    if (e.key === 'Escape') close();
  });
}

/* ═════════════════════════════════════════════════════════════════════
   DRAWER
   ═════════════════════════════════════════════════════════════════════ */
function openDrawer(projectId) {
  const p = getAllProjects().find(x => x.id === projectId);
  if (!p) return;
  const cat = DATA.categories.find(c => c.id === p.category);
  const stack = DATA.stacks.find(s => s.id === p.stack);

  $('#dEyebrow').textContent = cat?.name || 'Projekt';
  $('#dEyebrow').style.color = cat?.color || 'var(--gold-light)';
  $('#dTitle').textContent = p.name;
  $('#dClient').textContent =
    [p.client?.name, p.client?.company].filter(Boolean).filter((v,i,a) => a.indexOf(v) === i).join(' · ') || '—';

  let html = '';
  if (p.status_note) html += `<div class="drawer-section"><div class="status-callout">${esc(p.status_note)}</div></div>`;
  if (p.description) html += `<div class="drawer-section"><h3>Popis</h3><p>${esc(p.description)}</p></div>`;

  const metaItems = [];
  if (stack)              metaItems.push({ k: 'Stack', v: stack.name });
  if (p.owner)            metaItems.push({ k: 'Vlastník', v: ownerLabel(p.owner) });
  if (p.package)          metaItems.push({ k: 'Balíček', v: p.package });
  if (p.last_activity)    metaItems.push({ k: 'Poslední aktivita', v: formatDate(p.last_activity) });
  if (p.client?.email)    metaItems.push({ k: 'Email klienta', v: p.client.email });
  if (metaItems.length > 0) {
    html += `<div class="drawer-section"><h3>Detail</h3><div class="meta-grid">
      ${metaItems.map(m => `<div class="meta-item"><div class="key">${esc(m.k)}</div><div class="val">${esc(m.v)}</div></div>`).join('')}
    </div></div>`;
  }

  // Builtin links
  const links = p.links || {};
  const linkLabels = {
    live: { i: '🌐', l: 'Live web' },
    admin_menu: { i: '🍽', l: 'Admin Menu' },
    admin_rooms: { i: '🛏', l: 'Admin Ubytování' },
    repo: { i: '⚙', l: 'GitHub repo' },
    folder: { i: '📁', l: 'Lokální složka' }
  };
  const linkKeys = Object.keys(links).filter(k => links[k]);
  if (linkKeys.length > 0) {
    html += `<div class="drawer-section"><h3>Linky</h3><div class="links-grid">
      ${linkKeys.map(k => {
        const m = linkLabels[k] || { i: '↗', l: k };
        const isExternal = /^https?:/.test(links[k]);
        return `
          <a href="${isExternal ? esc(links[k]) : '#'}" ${isExternal ? 'target="_blank"' : 'onclick="return false"'}>
            <span class="link-row-icon">${m.i}</span>
            <span style="flex:1; min-width:0;">
              <div class="link-label">${m.l}</div>
              <div class="link-val">${esc(links[k])}</div>
            </span>
          </a>`;
      }).join('')}
    </div></div>`;
  }

  if (p.tech_notes) html += `<div class="drawer-section"><h3>Tech poznámky</h3><div class="tech-notes">${esc(p.tech_notes)}</div></div>`;
  if (p.todo && p.todo.length > 0) html += `<div class="drawer-section"><h3>TODO</h3><ul class="todo-list">${p.todo.map(t => `<li>${esc(t)}</li>`).join('')}</ul></div>`;
  if (p.tags && p.tags.length > 0) html += `<div class="drawer-section"><h3>Štítky</h3><div class="tags">${p.tags.map(t => `<span class="tag">#${esc(t)}</span>`).join('')}</div></div>`;

  // PINS section — vždy zobrazit, abych mohl přidat
  const pins = state.pins[projectId] || [];
  html += `<div class="drawer-section">
    <h3>
      <span>Připnuté <span style="color:var(--muted-2);font-weight:500;letter-spacing:0;text-transform:none;">${pins.length}</span></span>
      <button class="add-btn" data-pin-add="${esc(projectId)}">+ Přidat</button>
    </h3>
    <div class="pin-list">
      ${pins.map(pin => renderPin(projectId, pin)).join('') || '<p style="font-size:0.82rem;color:var(--muted-2);">Tu si připni cokoli — myšlenku, link, screenshot URL…</p>'}
    </div>
    <div class="pin-add-row" id="pinAddRow_${esc(projectId)}" style="display:none;">
      <textarea placeholder="Pin: text, URL, cokoli…" data-pin-input="${esc(projectId)}"></textarea>
      <button class="pin-add-btn" data-pin-save="${esc(projectId)}">Uložit</button>
    </div>
  </div>`;

  $('#drawerBody').innerHTML = html;
  $('#drawerOverlay').classList.add('open');
  $('#drawer').classList.add('open');

  // Bind pin actions
  const body = $('#drawerBody');
  body.querySelectorAll('[data-pin-del]').forEach(b => {
    b.addEventListener('click', () => {
      const [pId, pinId] = b.dataset.pinDel.split('|');
      state.pins[pId] = (state.pins[pId] || []).filter(x => x.id !== pinId);
      saveState();
      render();
      openDrawer(pId);
    });
  });
  body.querySelector('[data-pin-add]')?.addEventListener('click', () => {
    const row = body.querySelector(`#pinAddRow_${projectId}`);
    if (row) {
      row.style.display = row.style.display === 'flex' ? 'none' : 'flex';
      if (row.style.display === 'flex') row.querySelector('textarea').focus();
    }
  });
  body.querySelector('[data-pin-save]')?.addEventListener('click', () => {
    const ta = body.querySelector(`[data-pin-input="${projectId}"]`);
    const val = ta?.value?.trim();
    if (!val) return;
    const isUrl = /^https?:\/\/|^www\./i.test(val);
    if (!state.pins[projectId]) state.pins[projectId] = [];
    state.pins[projectId].push({
      id: uid('pin'),
      type: isUrl ? 'link' : 'note',
      value: isUrl ? (val.startsWith('http') ? val : 'https://' + val) : val
    });
    saveState();
    render();
    openDrawer(projectId);
  });
}

function renderPin(projId, pin) {
  if (pin.type === 'link') {
    return `<div class="pin">
      <div class="pin-icon">🔗</div>
      <div class="pin-body">
        ${pin.label ? `<div style="font-weight:600;margin-bottom:0.2rem;">${esc(pin.label)}</div>` : ''}
        <a href="${esc(pin.value)}" target="_blank">${esc(pin.value)}</a>
      </div>
      <button class="pin-del" data-pin-del="${esc(projId)}|${esc(pin.id)}" title="Smazat">✕</button>
    </div>`;
  }
  return `<div class="pin">
    <div class="pin-icon">📝</div>
    <div class="pin-body">${esc(pin.value).replace(/\n/g, '<br>')}</div>
    <button class="pin-del" data-pin-del="${esc(projId)}|${esc(pin.id)}" title="Smazat">✕</button>
  </div>`;
}

function closeDrawer() {
  $('#drawerOverlay').classList.remove('open');
  $('#drawer').classList.remove('open');
}

/* ═════════════════════════════════════════════════════════════════════
   PAN & ZOOM
   ═════════════════════════════════════════════════════════════════════ */
const viewState = { tx: 0, ty: 0, scale: 1 };
let panStart = null;

function applyTransform(animate = true) {
  const canvas = $('#canvas');
  if (!animate) canvas.classList.add('dragging');
  else canvas.classList.remove('dragging');
  canvas.style.transform = `translate(${viewState.tx}px, ${viewState.ty}px) scale(${viewState.scale})`;
  $('#zoomPercent').textContent = Math.round(viewState.scale * 100) + '%';
}

function bindPanZoom() {
  const wrap = $('#canvasWrap');

  wrap.addEventListener('mousedown', e => {
    if (e.target.closest('.node')) return;
    if (e.button !== 0) return;
    panStart = { x: e.clientX, y: e.clientY, tx: viewState.tx, ty: viewState.ty };
    wrap.classList.add('grabbing');
    e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!panStart) return;
    viewState.tx = panStart.tx + (e.clientX - panStart.x);
    viewState.ty = panStart.ty + (e.clientY - panStart.y);
    applyTransform(false);
  });
  window.addEventListener('mouseup', () => {
    if (panStart) { panStart = null; wrap.classList.remove('grabbing'); }
  });

  // Right-click on empty canvas
  wrap.addEventListener('contextmenu', e => {
    if (e.target.closest('.node')) return;
    e.preventDefault();
    showCtxMenu(e.clientX, e.clientY, ctxForCanvas());
  });

  wrap.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = wrap.getBoundingClientRect();
    const cx = e.clientX - rect.left - rect.width / 2;
    const cy = e.clientY - rect.top - rect.height / 2;
    const oldScale = viewState.scale;
    const delta = -e.deltaY * 0.0015;
    const newScale = Math.max(0.25, Math.min(2.5, oldScale * (1 + delta)));
    const ratio = newScale / oldScale;
    viewState.tx = cx - (cx - viewState.tx) * ratio;
    viewState.ty = cy - (cy - viewState.ty) * ratio;
    viewState.scale = newScale;
    applyTransform(false);
  }, { passive: false });

  // Touch
  let touchState = null;
  wrap.addEventListener('touchstart', e => {
    if (e.target.closest('.node')) return;
    if (e.touches.length === 1) {
      const t = e.touches[0];
      touchState = { mode: 'pan', x: t.clientX, y: t.clientY, tx: viewState.tx, ty: viewState.ty };
    } else if (e.touches.length === 2) {
      const t1 = e.touches[0], t2 = e.touches[1];
      const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
      touchState = { mode: 'zoom', dist, scale: viewState.scale };
    }
  });
  wrap.addEventListener('touchmove', e => {
    if (!touchState) return;
    if (e.target.closest('.node')) return;
    e.preventDefault();
    if (touchState.mode === 'pan' && e.touches.length === 1) {
      const t = e.touches[0];
      viewState.tx = touchState.tx + (t.clientX - touchState.x);
      viewState.ty = touchState.ty + (t.clientY - touchState.y);
      applyTransform(false);
    } else if (touchState.mode === 'zoom' && e.touches.length === 2) {
      const t1 = e.touches[0], t2 = e.touches[1];
      const dist = Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
      viewState.scale = Math.max(0.25, Math.min(2.5, touchState.scale * (dist / touchState.dist)));
      applyTransform(false);
    }
  }, { passive: false });
  wrap.addEventListener('touchend', () => { touchState = null; });

  $('#zoomIn').addEventListener('click', () => {
    viewState.scale = Math.min(2.5, viewState.scale * 1.2);
    applyTransform();
  });
  $('#zoomOut').addEventListener('click', () => {
    viewState.scale = Math.max(0.25, viewState.scale / 1.2);
    applyTransform();
  });
  $('#zoomReset').addEventListener('click', () => {
    viewState.tx = 0; viewState.ty = 0; viewState.scale = 1;
    applyTransform();
  });
}

/* ═════════════════════════════════════════════════════════════════════
   FILE DROP — drop souboru na canvas
   ═════════════════════════════════════════════════════════════════════ */
function bindFileDrop() {
  const wrap = $('#canvasWrap');
  wrap.addEventListener('dragover', e => {
    e.preventDefault();
    wrap.classList.add('drop-active');
  });
  wrap.addEventListener('dragleave', e => {
    if (e.target === wrap) wrap.classList.remove('drop-active');
  });
  wrap.addEventListener('drop', e => {
    e.preventDefault();
    wrap.classList.remove('drop-active');
    const c = clientToCanvas(e.clientX, e.clientY);
    if (e.dataTransfer.files?.length) {
      Array.from(e.dataTransfer.files).forEach((file, i) => {
        const note = {
          id: uid('note'),
          x: c.x + i * 30,
          y: c.y + i * 30,
          text: `📎 ${file.name}\n${(file.size / 1024).toFixed(1)} KB`,
          color: 'green'
        };
        state.notes.push(note);
      });
      saveState();
      render();
    } else {
      const url = e.dataTransfer.getData('text/uri-list') || e.dataTransfer.getData('text/plain');
      if (url && /^https?:/.test(url)) {
        const link = { id: uid('link'), x: c.x, y: c.y, url, title: '' };
        state.links.push(link);
        saveState();
        render();
      }
    }
  });
}

/* ═════════════════════════════════════════════════════════════════════
   EVENTS
   ═════════════════════════════════════════════════════════════════════ */
function bindEvents() {
  // Search
  const search = $('#search');
  search.addEventListener('input', e => {
    searchTerm = e.target.value.trim().toLowerCase();
    applyFilters();
  });
  document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement !== search && !$('#modalOverlay').classList.contains('open')) {
      e.preventDefault();
      search.focus();
    }
    if (e.key === 'Escape') {
      if ($('#modalOverlay').classList.contains('open')) {
        $('#modalOverlay').classList.remove('open');
      } else if ($('#drawer').classList.contains('open')) {
        closeDrawer();
      } else if (search.value) {
        search.value = ''; searchTerm = ''; applyFilters(); search.blur();
      }
    }
  });

  // Filter buttons
  document.addEventListener('click', e => {
    const btn = e.target.closest('.rail-btn');
    if (btn) {
      const type = btn.dataset.type;
      const id = btn.dataset.id;
      const setMap = { cat: filters.categories, stack: filters.stacks, owner: filters.owners };
      const set = setMap[type];
      if (set.has(id)) set.delete(id); else set.add(id);
      btn.classList.toggle('active');
      applyFilters();
    }
  });

  $('#clearFilters').addEventListener('click', () => {
    filters = { categories: new Set(), stacks: new Set(), owners: new Set() };
    $$('.rail-btn.active').forEach(b => b.classList.remove('active'));
    searchTerm = '';
    $('#search').value = '';
    applyFilters();
  });

  // Drawer
  $('#drawerClose').addEventListener('click', closeDrawer);
  $('#drawerOverlay').addEventListener('click', closeDrawer);

  // Dock buttons — přidávají do středu viewportu (tj. canvas (0,0) v aktuálním zoomu)
  $('#addNoteBtn').addEventListener('click', () => {
    const c = clientToCanvas(window.innerWidth / 2, window.innerHeight / 2);
    addNoteAt(c.x, c.y);
  });
  $('#addLinkBtn').addEventListener('click', () => {
    const c = clientToCanvas(window.innerWidth / 2, window.innerHeight / 2);
    promptAddLink(c.x, c.y);
  });
  $('#addProjectBtn').addEventListener('click', () => {
    const c = clientToCanvas(window.innerWidth / 2, window.innerHeight / 2);
    promptAddProject(c.x, c.y);
  });
  $('#resetLayoutBtn').addEventListener('click', resetLayout);
}
